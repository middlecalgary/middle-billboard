<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Middle Calgary — City Billboard</title>
<link rel="stylesheet" href="shared.css">
<style>
.page-header {
  padding: 20px 1.5vw 14px;
}
.page-header h1 {
  font-size: clamp(18px, 1.6vw, 26px);
  font-weight: 900;
  letter-spacing: -.05em;
}
.page-header p {
  font-size: clamp(10px, .85vw, 13px);
  color: var(--mid);
  margin-top: 3px;
}

.board { padding: 0 1.5vw 20px; }

.t.hidden { display: none; }

@media (max-width: 900px) {
  .page-header { padding: 20px 24px 14px; }
  .board { padding: 0 20px 16px; }
}

@media (max-width: 600px) {
  .page-header { padding: 16px 16px 12px; }
  .page-header h1 { font-size: 18px; }
  .page-header p  { font-size: 11px; }
  .board { padding: 0 10px 16px; }
}
</style>
</head>
<body>

<div id="nav-placeholder"></div>

<div class="page-header">
  <h1>Calgary's City Billboard</h1>
  <p>Local deals, events & businesses — updated daily</p>
</div>

<div class="board">
  <div class="billboard-grid" id="billboard"></div>
</div>

<div id="footer-placeholder"></div>

<script src="data.js"></script>
<script src="shared.js"></script>
<script>
injectNav("discover");
injectFooter();

const LAYOUT = [
  { adId: "brightstar", col: "1/span 2", row: "1/span 2" },
  { adId: "kinjo",      col: "3",        row: "1/span 2" },
  { adId: "gymvmt",     col: "4",        row: "1"        },
  { adId: "cactus",     col: "4",        row: "2"        },
  { adId: "stampede",   col: "1/span 2", row: "3"        },
  { adId: "inglewood",  col: "3",        row: "3"        },
  { adId: "starbucks",  col: "4",        row: "3"        },
  { adId: "peters",     col: "1",        row: "4"        },
  { adId: "jugo",       col: "2",        row: "4/span 2" },
  { adId: "badlands",   col: "1",        row: "5"        },
  { adId: "globalfest", col: "3/span 2", row: "4/span 2" },
  { adId: "middle",     col: "1/span 2", row: "6"        },
  { adId: "classpass",  col: "3",        row: "6"        },
  { adId: "lilac",      col: "4",        row: "6"        },
  { adId: null,         col: "1",        row: "7", avail: true, price: "$49/mo" },
  { adId: "leopolds",   col: "2/span 2", row: "7"        },
  { adId: null,         col: "4",        row: "7", avail: true, price: "$49/mo" },
  { adId: "cowboys",    col: "1",        row: "8/span 2" },
  { adId: null,         col: "2",        row: "8", avail: true, price: "$79/mo" },
  { adId: null,         col: "3/span 2", row: "8/span 2", avail: true, price: "$79/mo" },
  { adId: null,         col: "2",        row: "9", avail: true, price: "$79/mo" },
];

function buildTile(slot) {
  if (slot.avail) {
    const a = document.createElement("a");
    a.href = "claim.html";
    a.className = "t avail";
    a.setAttribute("data-category", "avail");
    a.style.gridColumn = slot.col;
    a.style.gridRow    = slot.row;
    a.innerHTML = `
      <div class="avail-plus">+</div>
      <div class="avail-label">Your Ad Here</div>
      <div class="avail-price">From ${slot.price}</div>
    `;
    return a;
  }

  const ad = getAd(slot.adId);
  if (!ad) return null;

  const a = document.createElement("a");
  a.href = ad.promoUrl;
  a.className = "t";
  a.setAttribute("data-size", ad.size);
  a.setAttribute("data-category", ad.category);
  a.style.gridColumn = slot.col;
  a.style.gridRow    = slot.row;

  const badge = ad.badge
    ? `<div class="stk ${ad.badge.cls}">${ad.badge.text}</div>`
    : "";

  a.innerHTML = `
    <div class="img-wrap">
      <img src="${ad.img}" alt="${ad.business}" style="object-position:${ad.imgPos};" loading="lazy">
      ${badge}
    </div>
    <div class="lbl">
      <span class="ln">${ad.business} — ${ad.offer}</span>
      <span class="lc">${ad.cta} →</span>
    </div>
  `;
  return a;
}

const grid = document.getElementById("billboard");
LAYOUT.forEach(slot => {
  const el = buildTile(slot);
  if (el) grid.appendChild(el);
});
</script>
</body>
</html>
